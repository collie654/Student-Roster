# docker-compose.yml
version: "3.9"
 
services:
 
  # PostgreSQL Database
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:  # runs ph_isready on an interval and sets servoce as healthy when it succeeds.
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval:  5s
      timeout:   5s
      retries:   10
      start_period: 10s
    ports:
      - "5432:5432"  # expose to connect with DB client (dev only)
 
  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL:                ${DATABASE_URL}
      SECRET_KEY:                  ${SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      ENVIRONMENT:                 ${ENVIRONMENT}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app # mounts local backend into the container at /app. this with --reload allows file changes to be instantly viewed
    depends_on: # waits for db containter to start to avoid backend trying to run Alembic migrations before db is ready and crashes.
      db:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
 
  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/src:/app/src
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
 
# Volumes
volumes:
  pg_data:
    driver: local
